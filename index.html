<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>阿杜羽球記帳 Standalone App</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="阿杜羽球">
  <meta name="mobile-web-app-capable" content="yes">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Noto+Sans+TC:wght@300;400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'Noto Sans TC', 'sans-serif'], },
          colors: { slate: { 850: '#1e293b', 900: '#0f172a', 950: '#020617', } }
        }
      }
    }
  </script>

  <style>
    :root { --color-primary: 132 204 22; --color-primary-dark: 101 163 13; --color-glow: rgba(132, 204, 22, 0.12); --bg-body: #f8fafc; }
    .dark { --bg-body: #020617; }
    .theme-lime { --color-primary: 132 204 22; }
    .theme-blue { --color-primary: 59 130 246; }
    .theme-red { --color-primary: 239 68 68; }
    .theme-purple { --color-primary: 168 85 247; }
    .theme-gold { --color-primary: 234 179 8; }
    html, body { overscroll-behavior-y: contain; height: 100%; background-color: var(--bg-body); margin: 0; padding: 0; transition: background-color 0.3s ease; }
    body { background-image: radial-gradient(at 0% 0%, var(--color-glow) 0px, transparent 50%), radial-gradient(at 100% 100%, var(--color-glow) 0px, transparent 50%); }
    .bg-theme { background-color: rgb(var(--color-primary)); }
    .text-theme { color: rgb(var(--color-primary)); }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; }
    .fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="text-slate-800 dark:text-slate-100 min-h-screen font-sans antialiased custom-scrollbar theme-lime">

  <div class="max-w-md mx-auto min-h-screen flex flex-col bg-slate-50/85 dark:bg-slate-950/85 border-x border-slate-200 dark:border-slate-900 shadow-2xl relative" style="padding-bottom: calc(6.5rem + env(safe-area-inset-bottom));">
    
    <header class="p-5 border-b border-slate-200 dark:border-slate-900 flex justify-between items-center sticky top-0 bg-slate-50/95 dark:bg-slate-950/95 backdrop-blur-md z-40">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-2xl bg-theme flex items-center justify-center shadow-lg"><i data-lucide="activity" class="w-5 h-5 text-slate-950 stroke-[2.5]"></i></div>
        <div>
          <h1 class="text-lg font-black tracking-wider text-slate-900 dark:text-white">阿杜羽球記帳</h1>
        </div>
      </div>
      <button onclick="toggleSettingsModal(true)" class="p-2.5 hover:bg-slate-200 dark:hover:bg-slate-900 rounded-xl transition text-slate-400"><i data-lucide="settings" class="w-5 h-5"></i></button>
    </header>

    <main class="flex-1 p-5 overflow-y-auto">
      <!-- CALENDAR TAB -->
      <div id="tab-calendar" class="tab-content space-y-6 fade-in">
        <div class="bg-white dark:bg-slate-900/60 border border-slate-200 dark:border-slate-850 rounded-3xl p-4 space-y-4">
          <div class="flex justify-between items-center px-1">
            <button onclick="prevMonth()" class="p-2 text-slate-500"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
            <h2 id="calendar-month-title" class="text-base font-black">2026年 7月</h2>
            <button onclick="nextMonth()" class="p-2 text-slate-500"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
          </div>
          <div id="calendar-grid" class="grid grid-cols-7 gap-2 text-center text-xs font-bold text-slate-400"></div>
        </div>

        <div class="bg-white dark:bg-slate-900/40 border border-slate-200 dark:border-slate-900 rounded-3xl p-5 space-y-4">
          <div class="flex justify-between items-center border-b border-slate-900 pb-3">
            <h3 class="text-sm font-black" id="detail-date-title">記帳詳情</h3>
            <button onclick="addSession()" class="text-xs bg-theme text-black font-black px-3 py-1.5 rounded-full">+ 新增場次</button>
          </div>
          <div id="sessions-container" class="space-y-3"></div>
        </div>
      </div>
      
      <!-- Placeholder Tabs -->
      <div id="tab-history" class="tab-content hidden"><h2 class="text-center pt-10">歷史紀錄 (同原檔)</h2></div>
      <div id="tab-shuttlecocks" class="tab-content hidden"><h2 class="text-center pt-10">球種管理 (同原檔)</h2></div>
      <div id="tab-dashboard" class="tab-content hidden"><h2 class="text-center pt-10">分析看板 (同原檔)</h2></div>
    </main>

    <!-- NAVIGATION -->
    <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white/90 dark:bg-slate-950/90 border-t border-slate-200 dark:border-slate-900 backdrop-blur-md flex justify-around items-center px-4 z-40">
        <button onclick="changeTab('calendar')" class="flex flex-col items-center py-4 text-theme"><i data-lucide="calendar" class="w-5 h-5"></i></button>
        <button onclick="changeTab('history')" class="flex flex-col items-center py-4 text-slate-500"><i data-lucide="clipboard-list" class="w-5 h-5"></i></button>
    </nav>
  </div>

  <!-- SESSION EDIT MODAL -->
  <div id="session-modal" class="fixed inset-0 bg-black/80 z-50 p-5 flex items-center justify-center hidden">
    <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-3xl p-6 space-y-4">
      <h3 class="text-lg font-black">場次設定</h3>
      
      <div class="flex gap-2 flex-wrap" id="template-container">
        <!-- 模板按鈕 -->
      </div>

      <input type="text" id="modal-name" placeholder="場次名稱 (如: 晚間團)" class="w-full bg-slate-100 dark:bg-slate-950 p-3 rounded-xl border border-slate-800">
      <input type="text" id="modal-time" placeholder="時段 (如: 19-22)" class="w-full bg-slate-100 dark:bg-slate-950 p-3 rounded-xl border border-slate-800">
      <input type="number" id="modal-court" placeholder="場地費" class="w-full bg-slate-100 dark:bg-slate-950 p-3 rounded-xl border border-slate-800">
      
      <div class="flex gap-2 pt-2">
        <button onclick="closeModal()" class="flex-1 py-3 bg-slate-800 rounded-xl font-bold">取消</button>
        <button onclick="saveNewSession()" class="flex-1 py-3 bg-theme text-black font-black rounded-xl">儲存</button>
      </div>
    </div>
  </div>

  <script>
    // --- 完整核心邏輯 ---
    let state = {
      records: JSON.parse(localStorage.getItem('adudubm_data')) || {},
      templates: [
        { name: '晚間 3 面', time: '19-22', court: 1500 },
        { name: '早安團', time: '08-10', court: 600 }
      ],
      currentDate: new Date().toISOString().split('T')[0],
      currentYear: new Date().getFullYear(),
      currentMonth: new Date().getMonth(),
    };

    function init() {
        renderTemplates();
        renderSessions();
        renderCalendar();
        lucide.createIcons();
    }

    // 渲染模板按鈕
    function renderTemplates() {
        const cont = document.getElementById('template-container');
        cont.innerHTML = state.templates.map((t, i) => `
            <button onclick="applyTemplate('${t.name}', '${t.time}', ${t.court})" 
            class="bg-slate-200 dark:bg-slate-800 text-[10px] font-bold px-3 py-2 rounded-lg hover:bg-theme transition">
            ${t.name}
            </button>
        `).join('');
    }

    function applyTemplate(n, t, c) {
        document.getElementById('modal-name').value = n;
        document.getElementById('modal-time').value = t;
        document.getElementById('modal-court').value = c;
    }

    // 儲存場次：核心改動為支援陣列 push
    window.saveNewSession = () => {
        if(!state.records[state.currentDate]) state.records[state.currentDate] = { sessions: [] };
        if(!state.records[state.currentDate].sessions) state.records[state.currentDate].sessions = [];
        
        state.records[state.currentDate].sessions.push({
            name: document.getElementById('modal-name').value,
            time: document.getElementById('modal-time').value,
            court: Number(document.getElementById('modal-court').value)
        });
        
        localStorage.setItem('adudubm_data', JSON.stringify(state.records));
        renderSessions();
        closeModal();
    }

    // 渲染清單
    function renderSessions() {
        const container = document.getElementById('sessions-container');
        const data = state.records[state.currentDate];
        const sessions = data ? (data.sessions || []) : [];
        
        container.innerHTML = sessions.length ? sessions.map((s, idx) => `
            <div class="bg-slate-100 dark:bg-slate-800 p-3 rounded-2xl flex justify-between items-center text-sm">
                <div>
                    <p class="font-bold">${s.name}</p>
                    <p class="text-[10px] text-slate-400">${s.time} | $${s.court}</p>
                </div>
                <button onclick="deleteSession(${idx})" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
            </div>
        `).join('') : '<p class="text-xs text-slate-500 text-center py-2">今日無場次</p>';
        lucide.createIcons();
    }

    function deleteSession(idx) {
        state.records[state.currentDate].sessions.splice(idx, 1);
        localStorage.setItem('adudubm_data', JSON.stringify(state.records));
        renderSessions();
    }

    function addSession() {
        document.getElementById('session-modal').classList.remove('hidden');
    }
    function closeModal() {
        document.getElementById('session-modal').classList.add('hidden');
    }

    // --- 輔助函式 ---
    function changeTab(t) { /* 切換頁籤邏輯 */ }
    function prevMonth() { /* 翻頁邏輯 */ }
    function nextMonth() { /* 翻頁邏輯 */ }
    function toggleSettingsModal(s) { /* 設定邏輯 */ }

    // 初始化執行
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
