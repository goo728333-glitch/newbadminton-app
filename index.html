<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>阿杜羽球記帳專業版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: { colors: { theme: { DEFAULT: '#84cc16', dark: '#65a30d' } } } }
    }
  </script>
  <style>
    body { transition: background-color 0.3s, color 0.3s; }
    .dark body { background-color: #020617; color: #f1f5f9; }
    body { background-color: #f8fafc; color: #0f172a; }
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 99px; }
    .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-md mx-auto min-h-screen flex flex-col bg-white dark:bg-slate-950 border-x border-slate-200 dark:border-slate-900 shadow-2xl relative" style="padding-bottom: calc(5rem + env(safe-area-inset-bottom));">
    
    <!-- 頂部標題 -->
    <header class="p-5 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center bg-white/90 dark:bg-slate-950/90 backdrop-blur-md sticky top-0 z-40">
      <div>
        <h1 class="text-lg font-black tracking-wider">阿杜羽球記帳</h1>
        <p class="text-[10px] text-slate-500 font-bold" id="current-date-display">2026-07-16</p>
      </div>
      <button onclick="toggleModal('settings-modal')" class="p-2 bg-slate-100 dark:bg-slate-900 rounded-xl"><i data-lucide="settings" class="w-5 h-5"></i></button>
    </header>

    <!-- 主內容區 -->
    <main class="flex-1 p-5 space-y-6">
      <!-- 時段選擇 -->
      <div class="space-y-2">
        <label class="text-xs font-black text-slate-500 dark:text-slate-400">開團時段</label>
        <div class="flex gap-2">
          <button onclick="addTimeSlot('19-21')" class="bg-slate-100 dark:bg-slate-800 text-[10px] px-3 py-1.5 rounded-full font-bold hover:bg-theme">+ 19-21</button>
          <button onclick="addTimeSlot('21-23')" class="bg-slate-100 dark:bg-slate-800 text-[10px] px-3 py-1.5 rounded-full font-bold hover:bg-theme">+ 21-23</button>
        </div>
        <div id="time-slots-container" class="flex flex-wrap gap-2 mt-2"></div>
      </div>

      <!-- 記帳表單 -->
      <div class="space-y-4">
        <div>
          <label class="text-xs font-black text-slate-500 dark:text-slate-400">場地費用 (NT$)</label>
          <input type="number" id="input-court-fee" oninput="calculate()" class="w-full mt-1 bg-slate-100 dark:bg-slate-900 rounded-2xl p-3 font-bold text-sm">
        </div>
        <div>
          <label class="text-xs font-black text-slate-500 dark:text-slate-400">消耗球數</label>
          <input type="number" id="input-balls" oninput="calculate()" class="w-full mt-1 bg-slate-100 dark:bg-slate-900 rounded-2xl p-3 font-bold text-sm">
        </div>
        <div class="bg-lime-50 dark:bg-lime-900/20 p-4 rounded-2xl flex justify-between items-center">
          <span class="text-sm font-black">預估損益</span>
          <span id="display-profit" class="text-lg font-black text-lime-600 dark:text-lime-400">NT$ 0</span>
        </div>
        <button onclick="save()" class="w-full bg-lime-500 text-white py-4 rounded-2xl font-black shadow-lg">儲存開團資料</button>
      </div>
    </main>

    <!-- 設定視窗 -->
    <div id="settings-modal" class="fixed inset-0 bg-slate-950/50 hidden z-50 flex items-center justify-center p-6">
      <div class="bg-white dark:bg-slate-900 p-6 rounded-3xl w-full max-w-sm space-y-4 border dark:border-slate-800">
        <h2 class="font-black text-lg">系統設定</h2>
        <button onclick="toggleDark()" class="w-full bg-slate-100 dark:bg-slate-800 p-4 rounded-2xl font-bold flex justify-between">
          切換亮/暗模式 <span>🌓</span>
        </button>
        <button onclick="toggleModal('settings-modal')" class="w-full bg-slate-200 dark:bg-slate-800 py-3 rounded-2xl font-black">關閉</button>
      </div>
    </div>
  </div>

  <script>
    let state = {
      records: JSON.parse(localStorage.getItem('ad_badminton_data')) || {},
      currentDate: '2026-07-16'
    };

    function toggleDark() { document.documentElement.classList.toggle('dark'); }
    function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }

    // 時段邏輯
    function addTimeSlot(slot) {
      if (!state.records[state.currentDate]) state.records[state.currentDate] = { timeSlots: [] };
      if (!state.records[state.currentDate].timeSlots.includes(slot)) {
        state.records[state.currentDate].timeSlots.push(slot);
        renderTimeSlots();
      }
    }

    function removeTimeSlot(index) {
      state.records[state.currentDate].timeSlots.splice(index, 1);
      renderTimeSlots();
    }

    function renderTimeSlots() {
      const container = document.getElementById('time-slots-container');
      container.innerHTML = '';
      (state.records[state.currentDate]?.timeSlots || []).forEach((slot, i) => {
        const span = document.createElement('span');
        span.className = 'bg-theme text-slate-950 text-[10px] px-3 py-1 rounded-lg font-black flex items-center gap-2';
        span.innerHTML = `${slot} <i data-lucide="x" class="w-3 h-3 cursor-pointer" onclick="removeTimeSlot(${i})"></i>`;
        container.appendChild(span);
      });
      lucide.createIcons();
    }

    // 計算與儲存
    function calculate() {
      const fee = Number(document.getElementById('input-court-fee').value) || 0;
      const balls = Number(document.getElementById('input-balls').value) || 0;
      // 假設單顆球成本 50
      const profit = -(fee + (balls * 50));
      document.getElementById('display-profit').innerText = `NT$ ${profit}`;
    }

    function save() {
      if (!state.records[state.currentDate]) state.records[state.currentDate] = { timeSlots: [] };
      state.records[state.currentDate].fee = document.getElementById('input-court-fee').value;
      state.records[state.currentDate].balls = document.getElementById('input-balls').value;
      localStorage.setItem('ad_badminton_data', JSON.stringify(state.records));
      alert('資料已儲存！');
    }

    window.onload = () => {
      renderTimeSlots();
      lucide.createIcons();
    };
  </script>
</body>
</html>
